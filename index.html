<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>루미큐브 v4</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ── 변수 ── */
:root {
  --bg:#f0f2f5; --panel:#fff; --board-bg:#e4e6eb; --rack-bg:#d8dadf;
  --text:#1c1e21; --tile-bg:#fff; --tile-sh:#b0b3b8;
  --blue:#3498db; --green:#2ecc71; --gold:#f1c40f; --red:#e74c3c; --purple:#9d50bb;
  --modal-bg:#fff; --border:rgba(0,0,0,.08);
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  --topbar:44px; --actbar:44px; --rack:108px;
  --tw:44px; --th:62px; /* JS의 TW/TH 와 동기 */
}
body[data-theme=dark]{--bg:#0d0d0f;--panel:#17181c;--board-bg:#111215;--rack-bg:#0d0d0f;--text:#e8e8f0;--tile-bg:#d8d8e0;--tile-sh:#1a1a20;--border:rgba(255,255,255,.06);--modal-bg:#1c1d22}
body[data-theme=pink]{--bg:#fff0f7;--panel:#ffd6e8;--board-bg:#ffe8f3;--rack-bg:#ffb6d4;--text:#b5005b;--tile-bg:#fff5f8;--tile-sh:#e8789a;--border:rgba(255,105,180,.2);--modal-bg:#fff0f7}
body[data-theme=navy]{--bg:#0d1422;--panel:#162038;--board-bg:#0f1828;--rack-bg:#0d1422;--text:#eef0f8;--tile-bg:#f4f7fa;--tile-sh:#748aa1;--border:rgba(107,147,201,.15);--modal-bg:#1b2a47}
body[data-theme=cinnamoroll]{--bg:#f2f8ff;--panel:#e1eefb;--board-bg:#eaf3fc;--rack-bg:#d3e3f2;--text:#5b7a99;--tile-bg:#fff;--tile-sh:#adbccb;--border:rgba(189,206,223,.4);--modal-bg:#f8fbff}
body[data-theme=pochacco]{--bg:#f0f0f8;--panel:#dcdcf0;--board-bg:#e8e8f5;--rack-bg:#c8c8e8;--text:#2a2a5a;--tile-bg:#fff;--tile-sh:#6a6ab8;--border:rgba(136,136,204,.3);--modal-bg:#f5f5fb}
body[data-theme=vintage]{--bg:#f5ede0;--panel:#e8d5bc;--board-bg:#ede0cc;--rack-bg:#d9c4a8;--text:#6b3a2a;--tile-bg:#fdf6ec;--tile-sh:#a07050;--border:rgba(192,128,96,.3);--modal-bg:#f5ede0}
body[data-theme=kitty]{--bg:#fff;--panel:#fff0f0;--board-bg:#fff5f5;--rack-bg:#ffe0e0;--text:#cc0000;--tile-bg:#fff;--tile-sh:#cc0000;--border:rgba(204,0,0,.15);--modal-bg:#fff}
body[data-theme=cyber]{--bg:#050505;--panel:#0a0a0f;--board-bg:#08080a;--rack-bg:#050505;--text:#00ffcc;--tile-bg:#141e1e;--tile-sh:#bc13fe;--border:rgba(188,19,254,.3);--modal-bg:#0f0f15}

/* ── 기본 ── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);user-select:none;touch-action:none}

#app{display:flex;flex-direction:column;height:100dvh;padding-top:var(--safe-t);padding-bottom:var(--safe-b);overflow:hidden}

/* ── 상단 바 ── */
#topbar{height:var(--topbar);flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:5px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
#topbar::-webkit-scrollbar{display:none}
.pbadge{display:inline-flex;align-items:center;gap:4px;background:rgba(128,128,128,.1);border:1.5px solid var(--border);border-radius:20px;padding:3px 8px;font-size:.68rem;font-weight:800;white-space:nowrap;flex-shrink:0;transition:all .2s;position:relative}
.pbadge.active{background:rgba(52,152,219,.2);border-color:var(--blue);color:var(--blue);box-shadow:0 0 8px rgba(52,152,219,.3)}
.pbadge .cnt{background:var(--text);color:var(--bg);padding:1px 4px;border-radius:7px;font-size:.65rem;font-weight:900}
#pool-info{margin-left:auto;background:var(--purple);color:#fff;border-radius:10px;padding:3px 7px;font-size:.63rem;font-weight:800;white-space:nowrap;flex-shrink:0}
#timer-m{font-size:.9rem;font-weight:900;color:var(--red);width:32px;text-align:center;flex-shrink:0}

/* ── 보드 ── */
#board-wrap{flex:1;min-height:0;overflow:hidden;position:relative;background:var(--board-bg);
  background-image:radial-gradient(circle,rgba(128,128,128,.12) 1px,transparent 1px);
  background-size:44px 44px;touch-action:none}
body[data-theme=dark] #board-wrap{background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px)}
body[data-theme=pink] #board-wrap{background-image:radial-gradient(circle,rgba(255,105,180,.2) 1px,transparent 1px)}
body[data-theme=navy] #board-wrap,body[data-theme=cyber] #board-wrap{
  background-image:linear-gradient(rgba(107,147,201,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(107,147,201,.07) 1px,transparent 1px);
  background-size:44px 44px}
body[data-theme=cyber] #board-wrap{background-image:linear-gradient(rgba(0,255,204,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,204,.08) 1px,transparent 1px)}

#board-canvas{position:absolute;top:0;left:0;width:1600px;height:1200px;transform-origin:0 0}
#board-wrap.dim{opacity:.78}
#board-wrap.place-mode{cursor:crosshair}

/* 스냅 미리보기 */
#snap-prev{position:absolute;border:2px dashed var(--blue);border-radius:7px;background:rgba(52,152,219,.15);pointer-events:none;display:none;z-index:500;transition:left .04s,top .04s}

/* ── 액션바 ── */
#actbar{height:var(--actbar);flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:6px}
.abtn{flex:1;height:32px;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.72rem;cursor:pointer;transition:all .15s;color:#fff}
.abtn:active{transform:scale(.95)}
.abtn:disabled{opacity:.35}
#btn-end{background:var(--green);color:#000}
#btn-draw{background:var(--blue)}
#btn-back{background:rgba(128,128,128,.25);color:var(--text)}
#btn-hint{background:var(--gold);color:#000}
#btn-chat{background:var(--purple);min-width:34px;max-width:34px;flex:none;font-size:.95rem}
#btn-spec{background:rgba(155,89,182,.3);color:var(--text);border:1.5px solid var(--purple);min-width:50px;max-width:50px;flex:none;font-size:.62rem}

/* ── 랙 ── */
#rack-wrap{
  height:var(--rack);flex-shrink:0;background:var(--rack-bg);
  border-top:2px solid var(--border);position:relative;
  /* ★ 핵심: overflow-x scroll + touch-action pan-x 로 가로 스크롤 보장 */
  overflow-x:scroll;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
}
#rack-wrap::-webkit-scrollbar{display:none}
#rack-inner{position:relative;height:100%;display:flex;align-items:center;padding:0 10px}
/* ★ flex + inline-size로 타일들이 줄 안 바꾸고 가로 스크롤 */

#sort-btns{position:absolute;top:4px;right:6px;display:flex;gap:3px;z-index:10}
.sbtn{padding:2px 6px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.15);color:var(--text);font-size:.58rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}

/* ── 타일 공통 ── */
.tile{
  width:var(--tw);height:var(--th);flex-shrink:0;
  background:var(--tile-bg);border-radius:7px;
  display:flex;justify-content:center;align-items:center;
  font-weight:900;font-size:1.15rem;
  box-shadow:0 3px 0 var(--tile-sh),0 4px 8px rgba(0,0,0,.12);
  border:1px solid rgba(0,0,0,.07);
  cursor:pointer;touch-action:none;-webkit-user-select:none;
  transition:transform .1s,box-shadow .1s;
}
.tile.red   {color:#e44d26;border-bottom:4px solid #e44d26}
.tile.blue  {color:#2980b9;border-bottom:4px solid #2980b9}
.tile.yellow{color:#f39c12;border-bottom:4px solid #f39c12}
.tile.black {color:#2d3436;border-bottom:4px solid #333}
.tile.joker {color:#8e44ad;font-size:1.35rem}
/* 보드 타일은 absolute */
#board-canvas .tile{position:absolute;transition:none}
/* 랙 타일은 flex item (position:static 유지) */
#rack-inner .tile{position:relative;margin:0 2px}

.tile.sel{box-shadow:0 0 0 3px var(--blue),0 6px 18px rgba(52,152,219,.4)!important;transform:scale(1.08) translateY(-5px)!important;z-index:200!important}
.tile.locked{opacity:.85;cursor:default}
.tile.newtile{box-shadow:0 3px 0 var(--tile-sh),0 0 0 1.5px rgba(52,152,219,.55),0 4px 8px rgba(0,0,0,.12)}

/* ★ 힌트 — !important 로 다른 스타일에 묻히지 않게 */
.tile.hint{
  animation:hint-pulse .8s ease-in-out infinite!important;
  z-index:150!important;
}
@keyframes hint-pulse{
  0%,100%{box-shadow:0 3px 0 var(--tile-sh),0 0 0 2px var(--gold),0 0 6px rgba(241,196,15,.4)}
  50%     {box-shadow:0 3px 0 var(--tile-sh),0 0 0 3px var(--gold),0 0 20px rgba(241,196,15,.8)}
}

/* 가로 모드 */
@media(orientation:landscape){
  :root{--topbar:36px;--actbar:36px;--rack:76px;--tw:36px;--th:50px}
  .tile{font-size:.95rem}
  .tile.joker{font-size:1.1rem}
  .abtn{height:26px;font-size:.65rem;border-radius:13px}
  #btn-chat{min-width:28px;max-width:28px;font-size:.8rem}
  #btn-spec{min-width:44px;max-width:44px;font-size:.58rem}
  #topbar{padding:0 6px;gap:4px}
  #actbar{padding:0 6px;gap:5px}
  #chat-panel{height:80vh;width:50vw;left:auto;right:0;border-radius:20px 20px 0 0}
}

/* ── 배치 모드 UI ── */
#place-hint{position:fixed;top:calc(var(--safe-t) + var(--topbar) + 6px);left:50%;transform:translateX(-50%);background:rgba(52,152,219,.92);color:#fff;padding:7px 18px;border-radius:20px;font-size:.76rem;font-weight:800;pointer-events:none;display:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 14px rgba(52,152,219,.35)}
#cancel-btn{position:fixed;bottom:calc(var(--rack) + var(--actbar) + var(--safe-b) + 8px);left:50%;transform:translateX(-50%);background:rgba(231,76,60,.9);color:#fff;border:none;border-radius:20px;padding:7px 20px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.76rem;display:none;z-index:9998;cursor:pointer;box-shadow:0 4px 14px rgba(231,76,60,.3)}
#reg-score{position:fixed;top:calc(var(--safe-t) + var(--topbar) + 5px);right:8px;background:rgba(241,196,15,.15);border:1px solid var(--gold);color:var(--gold);padding:3px 9px;border-radius:11px;font-size:.67rem;font-weight:900;z-index:9000;display:none;pointer-events:none}

/* ── 모달 ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;justify-content:center;align-items:center;z-index:50000}
.mcard{background:var(--modal-bg);color:var(--text);border-radius:20px;padding:24px 20px;width:88vw;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 10px 40px rgba(0,0,0,.4)}
.mcard h2{margin:0 0 14px;font-size:1.15rem}
.mcard input{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;outline:none;margin-bottom:12px}
.mbtn{width:100%;padding:12px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem;cursor:pointer;margin-bottom:7px;transition:all .15s}
.mbtn:active{transform:scale(.97)}
.mbtn.green{background:var(--green);color:#000}
.mbtn.gray{background:rgba(128,128,128,.2);color:var(--text)}
.mbtn.red{background:var(--red);color:#fff}
.player-tag{display:inline-flex;align-items:center;background:var(--blue);color:#fff;padding:5px 11px;border-radius:14px;margin:3px;font-size:.78rem;font-weight:800}
.player-tag.spec{background:rgba(128,128,128,.2);color:var(--text);border:1px dashed rgba(128,128,128,.4)}
.rank-table{width:100%;border-collapse:collapse;font-size:.83rem;margin-top:10px}
.rank-table th{color:var(--gold);border-bottom:1px solid var(--border);padding:5px;text-align:left}
.rank-table td{padding:5px;border-bottom:1px solid var(--border)}
.modebtn{padding:7px 14px;border-radius:10px;border:1.5px solid var(--border);background:rgba(128,128,128,.1);color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;margin:3px}
.modebtn.sel{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── 채팅 ── */
#chat-panel{position:fixed;bottom:0;left:0;right:0;height:55vh;background:var(--panel);border-top:2px solid var(--border);border-radius:20px 20px 0 0;display:flex;flex-direction:column;z-index:40000;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 -6px 30px rgba(0,0,0,.2)}
#chat-panel.open{transform:translateY(0)}
#chat-head{padding:10px 14px 7px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
#chat-head span{font-weight:900;font-size:.87rem}
#chat-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text)}
#chat-log{flex:1;overflow-y:auto;padding:8px 12px;font-size:.76rem;line-height:1.5}
#chat-log div{margin-bottom:3px;word-break:break-all}
#game-log{max-height:70px;overflow-y:auto;padding:5px 12px;font-size:.7rem;opacity:.7;border-top:1px solid var(--border);flex-shrink:0}
#emote-picker{display:none;flex-wrap:wrap;gap:4px;padding:7px 9px;background:var(--bg);border-top:1px solid var(--border)}
.emotebtn{padding:4px 9px;border-radius:11px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:.72rem;font-weight:700;cursor:pointer}
#chat-inp-wrap{display:flex;padding:7px 9px;gap:5px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:calc(7px + var(--safe-b))}
#chat-input{flex:1;padding:9px 11px;border-radius:18px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:.85rem;outline:none}
#chat-send{padding:9px 14px;border-radius:18px;border:none;background:var(--blue);color:#fff;font-weight:900;font-size:.82rem;cursor:pointer}

/* ── 이모트 말풍선 ── */
.bubble{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:3px 8px;border-radius:10px;font-size:.73rem;font-weight:700;white-space:nowrap;pointer-events:none;z-index:99999;animation:bpop 2.5s ease-in-out forwards;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.bubble::after{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#fff;border-top:none}
@keyframes bpop{0%{opacity:0;transform:translate(-50%,-8px) scale(.5)}10%{opacity:1;transform:translate(-50%,0) scale(1.15)}20%{transform:translate(-50%,0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,12px)}}

/* ── 관전자 손패 ── */
#spec-modal{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:2px solid var(--border);border-radius:20px 20px 0 0;z-index:45000;padding:12px 12px calc(16px + var(--safe-b));transform:translateY(100%);transition:transform .3s ease;max-height:60vh;overflow-y:auto}
#spec-modal.open{transform:translateY(0)}
#spec-modal h3{margin:0 0 9px;font-size:.92rem;display:flex;justify-content:space-between;align-items:center}
.spec-row{margin-bottom:12px}
.spec-label{font-size:.73rem;font-weight:800;color:var(--blue);margin-bottom:5px}
.spec-tiles{display:flex;flex-wrap:wrap;gap:4px}
.stile{width:34px;height:48px;background:var(--tile-bg);border-radius:6px;display:flex;justify-content:center;align-items:center;font-weight:900;font-size:.95rem;box-shadow:0 2px 0 var(--tile-sh);border:1px solid rgba(0,0,0,.08)}
.stile.red   {color:#e44d26;border-bottom:3px solid #e44d26}
.stile.blue  {color:#2980b9;border-bottom:3px solid #2980b9}
.stile.yellow{color:#f39c12;border-bottom:3px solid #f39c12}
.stile.black {color:#2d3436;border-bottom:3px solid #333}
.stile.joker {color:#8e44ad}

/* 테마 버튼 */
#theme-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tbtn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;background:#fff}
.tbtn.active{border-color:var(--blue);box-shadow:0 0 6px var(--blue)}

/* 흔들기 */
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-4px,-3px)}20%{transform:translate(4px,3px)}30%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}50%{transform:translate(-3px,3px)}60%{transform:translate(3px,-3px)}70%{transform:translate(-2px,2px)}80%{transform:translate(2px,-1px)}90%{transform:translate(-1px,1px)}}
.shaking{animation:shake .5s ease-in-out}

/* 테마별 타일 */
body[data-theme=cyber] .tile{background:rgba(20,20,30,.95)!important;border:1px solid #bc13fe!important;box-shadow:0 0 8px rgba(188,19,254,.5),inset 0 0 4px rgba(188,19,254,.2)!important;color:#fff!important}
body[data-theme=cyber] .tile.red   {color:#ff0055!important;text-shadow:0 0 8px #ff0055;border-bottom-color:#ff0055!important}
body[data-theme=cyber] .tile.blue  {color:#00d4ff!important;text-shadow:0 0 8px #00d4ff;border-bottom-color:#00d4ff!important}
body[data-theme=cyber] .tile.yellow{color:#ff0!important;text-shadow:0 0 8px #ff0;border-bottom-color:#ff0!important}
body[data-theme=cyber] .tile.black {color:#fff!important;text-shadow:0 0 5px #fff;border-bottom-color:#fff!important}
body[data-theme=dark]  .tile{background:linear-gradient(145deg,#e8e8f0,#d0d0dc)!important}
body[data-theme=pink]  .tile{background:linear-gradient(145deg,#fff5f8,#ffe4ef)!important;box-shadow:0 4px 0 #e8789a,0 6px 12px rgba(255,105,180,.25),inset 0 1px 0 rgba(255,255,255,.9)!important;border:1.5px solid #ffb6d4!important;border-radius:10px!important}
body[data-theme=navy]  .tile{background:linear-gradient(145deg,#fff,#f4f7fa)!important}
body[data-theme=vintage].tile{background:linear-gradient(145deg,#fdf6ec,#f0e0c8)!important;filter:sepia(15%)!important}
</style>
</head>
<body data-theme="classic">
<div id="app">
  <!-- 상단 바 -->
  <div id="topbar">
    <div id="plist" style="display:flex;gap:5px;align-items:center"></div>
    <span id="pool-info">POOL:0</span>
    <span id="timer-m"></span>
  </div>

  <!-- 보드 -->
  <div id="board-wrap">
    <div id="board-canvas"></div>
    <div id="snap-prev"></div>
  </div>

  <!-- 배치 모드 UI -->
  <div id="place-hint">보드를 탭해서 배치 · 다시 탭하면 취소</div>
  <button id="cancel-btn" onclick="cancelPlace()">✕ 취소</button>
  <div id="reg-score"></div>

  <!-- 액션바 -->
  <div id="actbar">
    <button class="abtn" id="btn-end"  onclick="handleTurnEnd()">완료</button>
    <button class="abtn" id="btn-draw" onclick="drawTile()">뽑기</button>
    <button class="abtn" id="btn-back" onclick="rollback()">무르기</button>
    <button class="abtn" id="btn-hint" onclick="showHint()">힌트</button>
    <button class="abtn" id="btn-spec" onclick="toggleSpec()" style="display:none">패보기</button>
    <button class="abtn" id="btn-chat" onclick="toggleChat()">💬</button>
  </div>

  <!-- 랙 -->
  <div id="rack-wrap">
    <div id="rack-inner"></div>
    <div id="sort-btns">
      <button class="sbtn" onclick="setSort('number')">숫자</button>
      <button class="sbtn" onclick="setSort('color')">색상</button>
      <button class="sbtn" onclick="setSort('manual')">수동</button>
    </div>
  </div>
</div>

<!-- 채팅 -->
<div id="chat-panel">
  <div id="chat-head"><span>💬 채팅 &amp; 로그</span><button id="chat-close" onclick="toggleChat()">✕</button></div>
  <div id="chat-log"></div>

<div id="entry-overlay" class="overlay" style="display:none">

<script>
/* ══════════════════════════════════════════════
   타일 크기 — CSS :root --tw/--th 와 동기
══════════════════════════════════════════════ */
function TW(){ return window.innerWidth > window.innerHeight ? 36 : 44 }
function TH(){ return window.innerWidth > window.innerHeight ? 50 : 62 }

/* ══════════════════════════════════════════════
   전역
══════════════════════════════════════════════ */
let db, myName='', myRole='player', currentHost='';
let playerList=[], currentTurn='', gameStatus='waiting', gameMode='normal';
let myHand=[], boardTiles={}, initBoard={};
let sortMode='color', manualOrder=[];
let selId=null, placeMode=false;
let turnTimer=null;
window.pdata={};
window.lastCounts={};
window.isEnding=false;

/* ── 사운드 ── */
function beep(f=440,d=.1,v=.3){
  try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=f;
    g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d);}catch(e){}
}
function sfx(k){
  if(k==='pick')  beep(600,.08,.2);
  if(k==='drop')  beep(440,.1,.2);
  if(k==='err')   beep(200,.2,.3);
  if(k==='ok')    beep(880,.15,.25);
  if(k==='turn')  {beep(660,.1,.3);setTimeout(()=>beep(880,.1,.3),150)}
  if(k==='warn')  {beep(330,.2,.3);setTimeout(()=>beep(220,.2,.3),250)}
}

/* ── 테마 ── */
function setTheme(n){
  document.body.setAttribute('data-theme',n);
  localStorage.setItem('lumi-theme',n);
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.classList.contains(n)));
}

/* ══════════════════════════════════════════════
   보드 변환 — 줌/패닝
   ★ fitBoard 는 최초 로드 1회만 호출, 이후 사용자 줌 유지
══════════════════════════════════════════════ */
let bScale=1, bTX=20, bTY=20;
let boardInitialized=false; // 최초 fit 완료 여부

function applyTransform(){
  document.getElementById('board-canvas').style.transform=
    `translate(${bTX}px,${bTY}px) scale(${bScale})`;
}

function fitBoard(){
  // 타일 없으면 기본값만
  if(Object.keys(boardTiles).length===0){
    bScale=1; bTX=20; bTY=20; applyTransform(); return;
  }
  const w=TW(),h=TH();
  const xs=Object.values(boardTiles).map(t=>t.x);
  const ys=Object.values(boardTiles).map(t=>t.y);
  const minX=Math.min(...xs)-16, minY=Math.min(...ys)-16;
  const maxX=Math.max(...xs)+w+16, maxY=Math.max(...ys)+h+16;
  const bw=document.getElementById('board-wrap');
  const vw=bw.clientWidth, vh=bw.clientHeight;
  const tw=maxX-minX, th=maxY-minY;
  const PAD=24;
  bScale=Math.max(.35,Math.min(1.8,(vw-PAD*2)/tw,(vh-PAD*2)/th));
  bTX=(vw-tw*bScale)/2-minX*bScale;
  bTY=(vh-th*bScale)/2-minY*bScale;
  applyTransform();
}

/* ── 핀치줌 + 패닝 ── */
let pinching=false, panning=false;
let pinchD0=1, pinchS0=1;
let panX0=0, panY0=0, panTX0=0, panTY0=0, panMoved=false;

const BW=document.getElementById('board-wrap');

BW.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinching=true; panning=false;
    pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchS0=bScale;
    e.preventDefault();
  } else if(e.touches.length===1){
    if(placeMode) return; // 배치 모드 중엔 탭 처리로
    panning=true; panMoved=false;
    panX0=e.touches[0].clientX; panY0=e.touches[0].clientY;
    panTX0=bTX; panTY0=bTY;
  }
},{passive:false});

BW.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    bScale=Math.max(.2,Math.min(5,pinchS0*(d/pinchD0)));
    applyTransform(); e.preventDefault();
  } else if(panning&&e.touches.length===1){
    const dx=e.touches[0].clientX-panX0, dy=e.touches[0].clientY-panY0;
    if(Math.abs(dx)>4||Math.abs(dy)>4) panMoved=true;
    bTX=panTX0+dx; bTY=panTY0+dy;
    applyTransform(); e.preventDefault();
    // 스냅 미리보기 업데이트
    if(placeMode) showSnapPrev(e.touches[0].clientX,e.touches[0].clientY);
  }
},{passive:false});

BW.addEventListener('touchend',e=>{
  if(e.touches.length<2) pinching=false;
  if(e.touches.length===0){
    // 배치 모드 탭 처리 — 움직이지 않았을 때만
    if(placeMode&&!panMoved&&selId){
      const t=e.changedTouches[0];
      doBoardPlace(t.clientX,t.clientY);
    }
    panning=false; panMoved=false;
    hidSnapPrev();
  }
},{passive:true});

/* 마우스 (PC 테스트용) */
BW.addEventListener('click',e=>{
  if(!placeMode||!selId) return;
  doBoardPlace(e.clientX,e.clientY);
});

/* ── 스냅 미리보기 ── */
const SNAP_EL=document.getElementById('snap-prev');
function showSnapPrev(cx,cy){
  if(!placeMode){hidSnapPrev();return}
  const {x,y}=calcDrop(cx,cy);
  const r=BW.getBoundingClientRect();
  const sx=x*bScale+bTX, sy=y*bScale+bTY;
  SNAP_EL.style.display='block';
  SNAP_EL.style.width=(TW()*bScale)+'px';
  SNAP_EL.style.height=(TH()*bScale)+'px';
  SNAP_EL.style.left=sx+'px';
  SNAP_EL.style.top=sy+'px';
}
function hidSnapPrev(){ SNAP_EL.style.display='none' }
BW.addEventListener('mousemove',e=>{ if(placeMode) showSnapPrev(e.clientX,e.clientY) });
BW.addEventListener('mouseleave',hidSnapPrev);
BW.addEventListener('touchmove',e=>{
  if(placeMode&&e.touches.length===1) showSnapPrev(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});

/* ── 좌표 계산 + 스냅 ── */
function calcDrop(cx,cy){
  const r=BW.getBoundingClientRect();
  const w=TW(),h=TH();
  let dx=(cx-r.left-bTX)/bScale-w/2;
  let dy=(cy-r.top -bTY)/bScale-h/2;
  const SNAP=w*0.75;
  let snapped=false;
  Object.values(boardTiles).forEach(t=>{
    if(snapped) return;
    const ddx=dx-t.x, ddy=dy-t.y;
    if(Math.abs(ddy)<SNAP){
      if(ddx>0&&ddx<w*1.7)       {dx=t.x+w+2;dy=t.y;snapped=true}
      else if(ddx<0&&ddx>-w*1.7) {dx=t.x-w-2;dy=t.y;snapped=true}
    }
    if(!snapped&&Math.abs(ddx)<SNAP){
      if(ddy>0&&ddy<h*1.7)       {dy=t.y+h+2;dx=t.x;snapped=true}
      else if(ddy<0&&ddy>-h*1.7) {dy=t.y-h-2;dx=t.x;snapped=true}
    }
  });
  return {x:Math.round(dx),y:Math.round(dy)};
}

/* ── 보드에 배치 ── */
function doBoardPlace(cx,cy){
  if(!selId) return;
  const td=myHand.find(t=>t.id===selId);
  if(!td){cancelPlace();return}
  const {x,y}=calcDrop(cx,cy);
  const {id,...clean}=td;
  const up={};
  up[`board/${selId}`]={...clean,x,y};
  up[`hands/${myName}/${selId}`]=null;
  db.ref('/').update(up).then(()=>sfx('drop'));
  cancelPlace();
}

/* ── 배치 모드 진입/취소 ── */
function enterPlace(id){
  cancelPlace();
  selId=id; placeMode=true;
  document.getElementById('place-hint').style.display='block';
  document.getElementById('cancel-btn').style.display='block';
  BW.classList.add('place-mode');
  // 랙의 해당 타일 선택 표시
  const el=document.querySelector(`#rack-inner .tile[data-id="${id}"]`);
  if(el) el.classList.add('sel');
  sfx('pick');
}
function cancelPlace(){
  placeMode=false; selId=null;
  document.getElementById('place-hint').style.display='none';
  document.getElementById('cancel-btn').style.display='none';
  BW.classList.remove('place-mode');
  hidSnapPrev();
  document.querySelectorAll('.tile.sel').forEach(t=>t.classList.remove('sel'));
}

/* ══════════════════════════════════════════════
   랙 렌더링
   ★ position:static flex item → overflow-x:scroll 가로 스크롤 작동
══════════════════════════════════════════════ */
function renderRack(){
  if(myRole==='spectator') return;
  const inner=document.getElementById('rack-inner');
  // 기존 타일만 제거 (sort 버튼 등 보존)
  inner.querySelectorAll('.tile').forEach(t=>t.remove());

  const coM={red:1,blue:2,yellow:3,black:4,joker:5};
  let sorted=[...myHand];
  if(sortMode==='manual'&&manualOrder.length){
    sorted.sort((a,b)=>{
      const ai=manualOrder.indexOf(a.id),bi=manualOrder.indexOf(b.id);
      return(ai<0?9999:ai)-(bi<0?9999:bi);
    });
  } else if(sortMode==='color'){
    sorted.sort((a,b)=>{
      const va=a.num==='J'?99:+a.num, vb=b.num==='J'?99:+b.num;
      return(coM[a.color]-coM[b.color])||(va-vb);
    });
  } else {
    sorted.sort((a,b)=>{
      const va=a.num==='J'?99:+a.num, vb=b.num==='J'?99:+b.num;
      return(va-vb)||(coM[a.color]-coM[b.color]);
    });
  }

  sorted.forEach(t=>{
    const div=document.createElement('div');
    div.className=`tile ${t.color}`;
    div.dataset.id=t.id;
    div.innerText=t.num;
    if(t.id===selId) div.classList.add('sel');

    div.addEventListener('click',e=>{
      e.stopPropagation();
      if(myRole!=='player'||currentTurn!==myName) return;
      if(selId===t.id){cancelPlace();return}
      enterPlace(t.id);
    });

    inner.appendChild(div);
  });
}

/* ══════════════════════════════════════════════
   보드 렌더링
══════════════════════════════════════════════ */
function renderBoard(){
  const canvas=document.getElementById('board-canvas');
  canvas.querySelectorAll('.tile').forEach(t=>t.remove());
  Object.entries(boardTiles).forEach(([id,data])=>{
    if(!data||data.num===undefined) return;
    const locked=!!initBoard[id];
    const div=document.createElement('div');
    div.className=`tile ${data.color}${locked?' locked':' newtile'}`;
    div.id='bt-'+id;
    div.innerText=data.num;
    div.style.left=data.x+'px';
    div.style.top=data.y+'px';
    if(!locked){
      div.addEventListener('click',e=>{
        e.stopPropagation();
        if(myRole!=='player'||currentTurn!==myName||placeMode) return;
        returnToRack(id);
      });
    }
    canvas.appendChild(div);
  });
}

function returnToRack(id){
  db.ref(`board/${id}`).once('value',s=>{
    if(!s.exists()) return;
    const {x,y,...clean}=s.val();
    db.ref('/').update({[`hands/${myName}/${id}`]:clean,[`board/${id}`]:null})
      .then(()=>sfx('pick'));
  });
}

/* ══════════════════════════════════════════════
   플레이어 뱃지
══════════════════════════════════════════════ */
function updateUI(){
  const el=document.getElementById('plist');
  if(!el) return;
  el.innerHTML='';
  playerList.forEach(name=>{
    const pd=window.pdata[name]||{};
    const sp=document.createElement('span');
    sp.id='badge-'+name;
    sp.className='pbadge'+(name===currentTurn?' active':'');
    sp.style.position='relative';
    sp.innerHTML=`${name===currentHost?'👑':''}${name} <span class="cnt">${pd.tileCount||0}</span>`;
    el.appendChild(sp);
  });
  Object.entries(window.pdata).forEach(([name,d])=>{
    if(!d.joined||d.role!=='spectator') return;
    const sp=document.createElement('span');
    sp.className='pbadge';sp.style.opacity='.6';
    sp.innerHTML=`👀${name}`;
    el.appendChild(sp);
  });
}

/* 등록 점수 */
function updateRegScore(){
  const badge=document.getElementById('reg-score');
  const isReg=window.pdata[myName]?.registered;
  if(isReg||currentTurn!==myName||myRole!=='player'){badge.style.display='none';return}
  let pts=0;
  Object.entries(boardTiles).forEach(([id,t])=>{if(!initBoard[id]) pts+=(t.num==='J'?30:+t.num)});
  badge.innerText=`등록:${pts}/30점`;
  badge.style.display='block';
  badge.style.borderColor=pts>=30?'#2ecc71':'#f1c40f';
  badge.style.color=pts>=30?'#2ecc71':'#f1c40f';
}

/* ══════════════════════════════════════════════
   게임 로직
══════════════════════════════════════════════ */
function isValidSet(tiles){
  if(tiles.length<3) return false;
  const j=tiles.filter(t=>t.num==='J');
  const non=tiles.filter(t=>t.num!=='J');
  if(!non.length) return true;
  const isGroup=()=>{
    const n=non[0].num, cols=non.map(t=>t.color);
    return non.every(t=>t.num===n)&&new Set(cols).size===cols.length&&tiles.length<=4;
  };
  const isRun=()=>{
    const col=non[0].color;
    if(!non.every(t=>t.color===col)) return false;
    const nums=non.map(t=>+t.num).sort((a,b)=>a-b);
    if(new Set(nums).size!==nums.length) return false;
    let gap=0;
    for(let i=0;i<nums.length-1;i++) gap+=nums[i+1]-nums[i]-1;
    if(gap>j.length) return false;
    const rem=j.length-gap;
    return(nums[0]-rem>=1||rem===0)&&nums[nums.length-1]<=13;
  };
  return isGroup()||isRun();
}

function validateBoard(){
  const w=TW(),h=TH();
  const ROW_T=h*.6, GAP_T=w*1.5;
  const tiles=Object.values(boardTiles);
  if(!tiles.length) return true;
  // y 클러스터링
  const rows=[]; const used=new Array(tiles.length).fill(false);
  tiles.forEach((t,i)=>{
    if(used[i]) return;
    const row=[t]; used[i]=true;
    tiles.forEach((u,j)=>{ if(!used[j]&&Math.abs(u.y-t.y)<ROW_T){row.push(u);used[j]=true} });
    rows.push(row);
  });
  for(const row of rows){
    row.sort((a,b)=>a.x-b.x);
    let cur=[];
    for(let i=0;i<row.length;i++){
      cur.push(row[i]);
      if(!row[i+1]||row[i+1].x-row[i].x>GAP_T){
        if(!isValidSet(cur)) return false;
        cur=[];
      }
    }
  }
  return true;
}

function nextTurn(){
  const next=playerList[(playerList.indexOf(currentTurn)+1)%playerList.length];
  db.ref('/').update({currentTurn:next,'settings/turnStartTime':firebase.database.ServerValue.TIMESTAMP});
}

function handleTurnEnd(){
  if(myRole!=='player') return;
  if(Object.keys(boardTiles).length===Object.keys(initBoard).length) return alert('패를 내거나 뽑으세요.');
  if(!validateBoard()){sfx('err');return alert('보드 배치가 유효하지 않습니다!')}
  if(window.isEnding) return;
  db.ref(`players/${myName}/registered`).once('value',snap=>{
    const isReg=snap.val();
    if(!isReg){
      const w=TW(), GAP=w*1.5;
      let piggy=false;
      const rows={};
      Object.entries(boardTiles).forEach(([id,t])=>{
        const k=Math.round(t.y/10)*10;
        if(!rows[k]) rows[k]=[];
        rows[k].push({...t,_id:id});
      });
      for(const k in rows){
        const rt=rows[k].sort((a,b)=>a.x-b.x);
        let cur=[];
        for(let i=0;i<rt.length;i++){
          cur.push(rt[i]);
          if(!rt[i+1]||rt[i+1].x-rt[i].x>GAP){
            if(cur.some(t=>initBoard[t._id])&&cur.some(t=>!initBoard[t._id])) piggy=true;
            cur=[];
          }
        }
      }
      if(piggy){sfx('err');return alert('첫 등록 시에는 바닥 패에 붙일 수 없습니다.')}
      let pts=0;
      Object.entries(boardTiles).forEach(([id,t])=>{if(!initBoard[id]) pts+=(t.num==='J'?30:+t.num)});
      if(pts<30){sfx('err');return alert(`등록 실패 (${pts}점)! 30점 이상 내야 합니다.`)}
      db.ref(`players/${myName}`).update({registered:true});
    }
    if(myHand.length===0){
      window.isEnding=true;
      db.ref('hands').once('value',hs=>{
        const all=hs.val(), scores={};
        playerList.forEach(p=>{let s=0;Object.values(all[p]||{}).forEach(t=>s+=(t.num==='J'?50:+t.num));scores[p]=s});
        recordWin(myName);
        db.ref('/').update({'settings/status':'finished','settings/gameResult':{winner:myName,scores}})
          .then(()=>setTimeout(()=>{window.isEnding=false},3000));
      });
    } else {
      addLog(!isReg?`⭐ ${myName}님이 첫 등록에 성공했습니다!`:`🔄 ${myName}님이 턴을 마쳤습니다.`);
      if(!isReg) db.ref('shake').set({by:myName,time:Date.now()});
      nextTurn();
    }
  });
}

function rollback(){
  if(myRole!=='player') return;
  if(!confirm('모든 동작을 취소할까요?')) return;
  const up={};
  Object.keys(boardTiles).forEach(k=>{if(!initBoard[k]) up[`hands/${myName}/${k}`]=boardTiles[k]});
  up['board']=initBoard;
  db.ref('/').update(up).then(()=>{cancelPlace();sfx('pick')});
}

function drawTile(){
  if(myRole!=='player') return;
  if(Object.keys(boardTiles).length>Object.keys(initBoard).length) return alert('패를 냈다면 무르거나 종료해야 합니다.');
  db.ref('pool').limitToFirst(1).once('value',s=>{
    if(!s.exists()) return nextTurn();
    const pool=s.val(),key=Object.keys(pool)[0],up={};
    up[`hands/${myName}/tile_${Date.now()}`]=pool[key];
    up[`pool/${key}`]=null;
    addLog(`🎴 ${myName}님이 타일을 1개 뽑았습니다.`);
    db.ref('/').update(up).then(()=>{sfx('pick');nextTurn()});
  });
}

function setSort(m){
  sortMode=m;
  if(m==='manual') manualOrder=myHand.map(t=>t.id);
  renderRack();
}

/* ══════════════════════════════════════════════
   힌트
   ★ DOM 직접 쿼리 + setTimeout 으로 렌더 후 적용 보장
══════════════════════════════════════════════ */
function showHint(){
  if(myRole!=='player'||currentTurn!==myName) return alert('내 차례에만 사용할 수 있습니다.');

  // 기존 힌트 클리어
  document.querySelectorAll('.tile.hint').forEach(t=>t.classList.remove('hint'));

  const hand=[...myHand];
  if(!hand.length) return alert('손패가 없습니다.');

  const hintIds=new Set();
  const jokers=hand.filter(t=>t.num==='J');

  // ① 같은 숫자 그룹 (3개 이상, 다른 색)
  const numMap={};
  hand.forEach(t=>{
    if(t.num==='J') return;
    if(!numMap[t.num]) numMap[t.num]=[];
    if(!numMap[t.num].find(x=>x.color===t.color)) numMap[t.num].push(t);
  });
  Object.values(numMap).forEach(g=>{
    if(g.length>=3) g.forEach(t=>hintIds.add(t.id));
    // 조커로 보완
    if(g.length===2&&jokers.length){ g.forEach(t=>hintIds.add(t.id)); jokers.forEach(j=>hintIds.add(j.id)) }
  });

  // ② 같은 색 연속 런 (3개 이상)
  const colMap={red:[],blue:[],yellow:[],black:[]};
  hand.forEach(t=>{ if(t.num!=='J'&&colMap[t.color]) colMap[t.color].push(t) });
  Object.values(colMap).forEach(ts=>{
    ts.sort((a,b)=>+a.num - +b.num);
    let run=[ts[0]];
    for(let i=1;i<ts.length;i++){
      const gap=+ts[i].num - +run[run.length-1].num;
      if(gap===1) run.push(ts[i]);
      else if(gap===2&&jokers.length){ run.push(ts[i]) } // 조커로 구멍 메우기
      else{ if(run.length>=3) run.forEach(t=>hintIds.add(t.id)); run=[ts[i]] }
    }
    if(run.length>=3) run.forEach(t=>hintIds.add(t.id));
  });

  // 조커 자체도 힌트에 포함 (뭔가에 쓸 수 있을 때)
  if(hintIds.size>0) jokers.forEach(j=>hintIds.add(j.id));

  if(!hintIds.size) return alert('현재 낼 수 있는 타일이 없습니다.');

  // ★ setTimeout 0 으로 현재 렌더 사이클 이후에 DOM 조작
  setTimeout(()=>{
    hintIds.forEach(id=>{
      // data-id 속성으로 탐색
      const el=document.querySelector(`#rack-inner .tile[data-id="${id}"]`);
      if(el){ el.classList.add('hint') }
    });
    setTimeout(()=>{
      document.querySelectorAll('.tile.hint').forEach(t=>t.classList.remove('hint'));
    },5000);
  },0);
}

function toggleSpec(){

  if(m.classList.contains('open')){m.classList.remove('open');return}
  db.ref('hands').once('value',snap=>{
    const all=snap.val()||{}, cont=document.getElementById('spec-content');
    cont.innerHTML='';
    playerList.forEach(pn=>{
      const hand=Object.values(all[pn]||{});
      const row=document.createElement('div'); row.className='spec-row';
      const label=document.createElement('div'); label.className='spec-label';
      label.innerText=`${pn===currentTurn?'▶ ':''}${pn} (${hand.length}개)`;
      const wrap=document.createElement('div'); wrap.className='spec-tiles';
      const coM={red:1,blue:2,yellow:3,black:4,joker:5};
      hand.sort((a,b)=>{const va=a.num==='J'?99:+a.num,vb=b.num==='J'?99:+b.num;return(coM[a.color]-coM[b.color])||(va-vb)})
        .forEach(t=>{
          const tile=document.createElement('div');
          tile.className=`stile ${t.color}`; tile.innerText=t.num;
          wrap.appendChild(tile);
        });
      row.appendChild(label); row.appendChild(wrap); cont.appendChild(row);
    });
    m.classList.add('open');
  });
}

function renderResult(){
  db.ref('settings/gameResult').once('value',snap=>{
    const data=snap.val(); if(!data) return;
    const mb=document.getElementById('modal-body');
    let html=`<h2 style="color:var(--gold)">🏆 WINNER: ${data.winner}!</h2>`;
    Object.entries(data.scores).sort((a,b)=>a[1]-b[1]).forEach(([n,s])=>{
      html+=`<div style="display:flex;justify-content:space-between;padding:7px;border-bottom:1px solid var(--border)">
        <span>${n}</span><span>${n===data.winner?'WINNER':s+'점'}</span></div>`;
    });
    if(myName===currentHost) html+=`<button class="mbtn gray" onclick="returnToLobby()" style="margin-top:14px">대기실로</button>`;
    mb.innerHTML=html;
  });
}

async function getRankHtml(){
  return new Promise(res=>{
    db.ref('stats').once('value',snap=>{
      const s=snap.val()||{};
      let h=`<table class="rank-table"><tr><th>이름</th><th>승리</th></tr>`;
      const sorted=Object.entries(s).sort((a,b)=>b[1].wins-a[1].wins);
      if(!sorted.length) h+=`<tr><td colspan="2">전적 없음</td></tr>`;
      sorted.forEach(([n,d])=>{ h+=`<tr><td>${n}</td><td>${d.wins}회</td></tr>` });
      h+=`</table>`; res(h);
    });
  });
}

function resetRank(){ if(confirm('전적 초기화?')) db.ref('stats').remove().then(renderLobby) }

function startGame(){
  if(playerList.length<2) return alert('최소 2명이 필요합니다.');
  const colors=['red','blue','yellow','black'], sets=gameMode==='expert'?3:2;
  let pool=[];
  colors.forEach(c=>{for(let i=1;i<=13;i++) for(let j=0;j<sets;j++) pool.push({num:i,color:c})});
  pool.push({num:'J',color:'joker'},{num:'J',color:'joker'});
  if(sets===3) pool.push({num:'J',color:'joker'},{num:'J',color:'joker'});
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  const updates={board:null,currentTurn:playerList[0],'settings/status':'playing',chats:null,logs:null};
  const hands={};
  playerList.forEach(p=>{hands[p]={};updates[`players/${p}/registered`]=false});
  for(let i=0;i<14;i++) playerList.forEach(p=>{
    const t=pool.pop();
    if(t) hands[p]['tile_'+Math.random().toString(36).substr(2,9)]=t;
  });
  updates['hands']=hands;
  const poolObj={}; pool.forEach((t,i)=>poolObj[`p_${i}`]=t);
  updates['pool']=poolObj;
  db.ref('/').update(updates).then(()=>{
    db.ref('settings/turnStartTime').set(firebase.database.ServerValue.TIMESTAMP);
    addLog('📢 게임이 시작되었습니다!');
  });
}

function returnToLobby(){
  if(!confirm('방 전체 데이터를 초기화할까요?')) return;
  const up={'settings/status':'waiting',board:null,hands:null,pool:null,'settings/gameResult':null};
  const shuffled=[...playerList].sort(()=>Math.random()-.5);
  shuffled.forEach((n,i)=>{up[`players/${n}/timestamp`]=i*1000+Math.floor(Math.random()*999)});
  db.ref('/').update(up).then(()=>addLog('🔀 플레이어 순서가 랜덤으로 섞였습니다.'));
}

function handleEntry(role,isAuto=false){
  if(!db) return setTimeout(()=>handleEntry(role,isAuto),100);
  if(!isAuto){
    const v=document.getElementById('nick-input').value.trim();
    if(!v) return alert('닉네임을 입력하세요!');
    myName=v; myRole=role;
  } else {
    myName=sessionStorage.getItem('lumi-nick');
    myRole=sessionStorage.getItem('lumi-role')||'player';
  }
  sessionStorage.setItem('lumi-nick',myName);
  sessionStorage.setItem('lumi-role',myRole);
  db.ref('players/'+myName).update({joined:true,timestamp:Date.now(),role:myRole});
  db.ref('players/'+myName+'/joined').onDisconnect().set(false);
  document.getElementById('entry-overlay').style.display='none';
  sfx('ok');
  if(myRole==='spectator'){
    document.getElementById('rack-wrap').style.display='none';
    document.getElementById('btn-spec').style.display='flex';
    ['btn-end','btn-draw','btn-back','btn-hint'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.style.display='none';
    });
  }
  db.ref('board').once('value',s=>{initBoard=s.val()||{}});
  if(myRole==='player'){
    db.ref('hands/'+myName).on('value',snap=>{
      myHand=Object.entries(snap.val()||{}).map(([id,val])=>({id,...val}));
      db.ref('players/'+myName).update({tileCount:myHand.length});
      renderRack();
    });
  }
}
