<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>루미큐브 모바일 Ver.03</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
/* ===========================
   CSS 변수 & 기본 테마
=========================== */
:root {
    --bg: #f0f2f5;
    --panel: #ffffff;
    --board-bg: #e4e6eb;
    --rack-bg: #d8dadf;
    --text: #1c1e21;
    --tile-bg: #ffffff;
    --tile-shadow: #b0b3b8;
    --blue: #3498db;
    --green: #2ecc71;
    --gold: #f1c40f;
    --red: #e74c3c;
    --purple: #9d50bb;
    --modal-bg: #ffffff;
    --border: rgba(0,0,0,0.08);

    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);

    --topbar-height: 44px;
    --actionbar-height: 44px;
    --rack-height: 108px;

    /* ★ 타일 크기 — JS와 반드시 동기화 */
    --tw: 44px;   /* tile width  */
    --th: 62px;   /* tile height */
}

body[data-theme='dark'] {
    --bg: #0d0d0f; --panel: #17181c; --board-bg: #111215;
    --rack-bg: #0d0d0f; --text: #e8e8f0; --tile-bg: #d8d8e0;
    --tile-shadow: #1a1a20; --border: rgba(255,255,255,0.06);
    --modal-bg: #1c1d22;
}
body[data-theme='pink'] {
    --bg: #fff0f7; --panel: #ffd6e8; --board-bg: #ffe8f3;
    --rack-bg: #ffb6d4; --text: #b5005b; --tile-bg: #fff5f8;
    --tile-shadow: #e8789a; --border: rgba(255,105,180,0.2);
    --modal-bg: #fff0f7;
}
body[data-theme='navy'] {
    --bg: #0d1422; --panel: #162038; --board-bg: #0f1828;
    --rack-bg: #0d1422; --text: #eef0f8; --tile-bg: #f4f7fa;
    --tile-shadow: #748aa1; --border: rgba(107,147,201,0.15);
    --modal-bg: #1b2a47;
}
body[data-theme='cinnamoroll'] {
    --bg: #f2f8ff; --panel: #e1eefb; --board-bg: #eaf3fc;
    --rack-bg: #d3e3f2; --text: #5b7a99; --tile-bg: #ffffff;
    --tile-shadow: #adbccb; --border: rgba(189,206,223,0.4);
    --modal-bg: #f8fbff;
}
body[data-theme='pochacco'] {
    --bg: #f0f0f8; --panel: #dcdcf0; --board-bg: #e8e8f5;
    --rack-bg: #c8c8e8; --text: #2a2a5a; --tile-bg: #ffffff;
    --tile-shadow: #6a6ab8; --border: rgba(136,136,204,0.3);
    --modal-bg: #f5f5fb;
}
body[data-theme='vintage'] {
    --bg: #f5ede0; --panel: #e8d5bc; --board-bg: #ede0cc;
    --rack-bg: #d9c4a8; --text: #6b3a2a; --tile-bg: #fdf6ec;
    --tile-shadow: #a07050; --border: rgba(192,128,96,0.3);
    --modal-bg: #f5ede0;
}
body[data-theme='kitty'] {
    --bg: #ffffff; --panel: #fff0f0; --board-bg: #fff5f5;
    --rack-bg: #ffe0e0; --text: #cc0000; --tile-bg: #ffffff;
    --tile-shadow: #cc0000; --border: rgba(204,0,0,0.15);
    --modal-bg: #ffffff;
}
body[data-theme='cyber'] {
    --bg: #050505; --panel: #0a0a0f; --board-bg: #08080a;
    --rack-bg: #050505; --text: #00ffcc; --tile-bg: #141e1e;
    --tile-shadow: #bc13fe; --border: rgba(188,19,254,0.3);
    --modal-bg: #0f0f15;
}

/* ===========================
   기본 레이아웃
=========================== */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    user-select: none;
    touch-action: none;
}

#app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    width: 100%;
    overflow: hidden;
}

/* ===========================
   상단 바
=========================== */
#top-bar {
    height: var(--topbar-height);
    flex-shrink: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 5px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
}
#top-bar::-webkit-scrollbar { display: none; }

.p-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(128,128,128,0.1);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 3px 8px;
    font-size: 0.68rem;
    font-weight: 800;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s;
    position: relative;
}
.p-badge.active {
    background: rgba(52,152,219,0.2);
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: 0 0 8px rgba(52,152,219,0.3);
}
.p-badge .cnt {
    background: var(--text);
    color: var(--bg);
    padding: 1px 4px;
    border-radius: 7px;
    font-size: 0.65rem;
    font-weight: 900;
}

#pool-info {
    margin-left: auto;
    background: var(--purple);
    color: white;
    border-radius: 10px;
    padding: 3px 7px;
    font-size: 0.63rem;
    font-weight: 800;
    white-space: nowrap;
    flex-shrink: 0;
}

#timer-m {
    font-size: 0.9rem;
    font-weight: 900;
    color: var(--red);
    width: 32px;
    text-align: center;
    flex-shrink: 0;
}

/* ===========================
   보드 영역
=========================== */
#board-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
    background: var(--board-bg);
    background-image: radial-gradient(circle, rgba(128,128,128,0.12) 1px, transparent 1px);
    background-size: 44px 44px;
    touch-action: none;
    cursor: default;
}
body[data-theme='dark'] #board-wrap {
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
}
body[data-theme='pink'] #board-wrap {
    background-image: radial-gradient(circle, rgba(255,105,180,0.2) 1px, transparent 1px);
}
body[data-theme='navy'] #board-wrap {
    background-image: linear-gradient(rgba(107,147,201,0.07) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(107,147,201,0.07) 1px, transparent 1px);
    background-size: 44px 44px;
}
body[data-theme='cyber'] #board-wrap {
    background-image: linear-gradient(rgba(0,255,204,0.08) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,204,0.08) 1px, transparent 1px);
    background-size: 44px 44px;
}

#board-canvas {
    position: absolute;
    top: 0; left: 0;
    /* ★ 캔버스 크기 대폭 축소 — 광활함 제거 */
    width: 1200px;
    height: 900px;
    transform-origin: 0 0;
}

#board-wrap.not-my-turn { opacity: 0.80; }

/* ★ 배치 모드일 때 커서/안내선 */
#board-wrap.place-mode { cursor: crosshair; }

/* 그리드 스냅 미리보기 */
#snap-preview {
    position: absolute;
    width: var(--tw);
    height: var(--th);
    border: 2px dashed var(--blue);
    border-radius: 7px;
    background: rgba(52,152,219,0.18);
    pointer-events: none;
    display: none;
    z-index: 998;
    transition: left 0.05s, top 0.05s;
}

/* ===========================
   액션 바
=========================== */
#action-bar {
    height: var(--actionbar-height);
    flex-shrink: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    gap: 6px;
}

.act-btn {
    flex: 1;
    height: 32px;
    border: none;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    color: white;
}
.act-btn:active { transform: scale(0.95); }
.act-btn:disabled { opacity: 0.35; }

#btn-end-m   { background: var(--green); color: #000; }
#btn-draw-m  { background: var(--blue); }
#btn-back-m  { background: rgba(128,128,128,0.25); color: var(--text); }
#btn-hint-m  { background: var(--gold); color: #000; }
#btn-chat-m  { background: var(--purple); min-width: 34px; max-width: 34px; flex: none; font-size: 0.95rem; }

#btn-spec-hand-m {
    background: rgba(155,89,182,0.3);
    color: var(--text);
    border: 1.5px solid var(--purple);
    min-width: 50px;
    max-width: 50px;
    flex: none;
    font-size: 0.62rem;
}

/* ===========================
   내 패 (하단 랙)
   rack-height=108, tile-height=62 → top=(108-62)/2=23px
=========================== */
#rack-wrap {
    height: var(--rack-height);
    flex-shrink: 0;
    background: var(--rack-bg);
    border-top: 2px solid var(--border);
    position: relative;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    /* ★ 배치 모드 아닐 때만 pan-x 허용 */
    touch-action: pan-x;
}
#rack-wrap.place-mode-rack { touch-action: none; }
#rack-wrap::-webkit-scrollbar { display: none; }

#rack-inner {
    position: relative;
    height: 100%;
    min-width: 100%;
    white-space: nowrap;
}

#rack-sort-btns {
    position: absolute;
    top: 4px; right: 6px;
    display: flex;
    gap: 3px;
    z-index: 10;
}
.sort-btn {
    padding: 2px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.15);
    color: var(--text);
    font-size: 0.58rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
}

/* ===========================
   타일 공통
=========================== */
.tile {
    position: absolute;
    width: var(--tw);
    height: var(--th);
    background: var(--tile-bg);
    border-radius: 7px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 900;
    font-size: 1.15rem;
    box-shadow: 0 3px 0 var(--tile-shadow), 0 4px 8px rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.07);
    cursor: pointer;
    z-index: 10;
    transition: transform 0.1s, box-shadow 0.1s;
    touch-action: none;
    -webkit-user-select: none;
}
.tile.red    { color: #e44d26; border-bottom: 4px solid #e44d26; }
.tile.blue   { color: #2980b9; border-bottom: 4px solid #2980b9; }
.tile.yellow { color: #f39c12; border-bottom: 4px solid #f39c12; }
.tile.black  { color: #2d3436; border-bottom: 4px solid #333; }
.tile.joker  { color: #8e44ad; font-size: 1.35rem; }

/* 선택된 타일 */
.tile.selected-tile {
    box-shadow: 0 0 0 3px var(--blue), 0 6px 18px rgba(52,152,219,0.4) !important;
    transform: scale(1.08) translateY(-5px) !important;
    z-index: 200 !important;
}

/* 힌트 타일 */
.tile.hint-target {
    animation: mob-hint 0.85s ease-in-out infinite;
    z-index: 50 !important;
}
@keyframes mob-hint {
    0%,100% { box-shadow: 0 3px 0 var(--tile-shadow), 0 0 0 2px var(--gold); }
    50%      { box-shadow: 0 3px 0 var(--tile-shadow), 0 0 16px 4px var(--gold), 0 0 0 2px var(--gold); }
}

/* 랙 타일 top 위치 */
.rack-tile { top: 23px; }

/* 보드에서 원래 타일 (움직일 수 없는) */
.tile.locked {
    opacity: 0.88;
    cursor: default;
}
/* 이번 턴에 새로 올린 타일 강조 */
.tile.new-tile {
    box-shadow: 0 3px 0 var(--tile-shadow), 0 0 0 1.5px rgba(52,152,219,0.5), 0 4px 8px rgba(0,0,0,0.12);
}

/* ===========================
   가로 모드
=========================== */
@media (orientation: landscape) {
    :root {
        --topbar-height: 36px;
        --actionbar-height: 36px;
        --rack-height: 80px;
        --tw: 36px;
        --th: 52px;
    }
    .rack-tile { top: 14px; } /* (80-52)/2 */

    .tile { font-size: 0.95rem; }
    .tile.joker { font-size: 1.1rem; }

    .act-btn { height: 26px; font-size: 0.65rem; border-radius: 13px; }
    #btn-chat-m  { min-width: 28px; max-width: 28px; font-size: 0.8rem; }
    #btn-spec-hand-m { min-width: 44px; max-width: 44px; font-size: 0.58rem; }
    #top-bar { padding: 0 6px; gap: 4px; }
    #action-bar { padding: 0 6px; gap: 5px; }

    #chat-panel { height: 80vh; width: 50vw; left: auto; right: 0; border-radius: 20px 20px 0 0; }
}

/* ===========================
   배치 모드 배너
=========================== */
#place-mode-hint {
    position: fixed;
    top: calc(var(--safe-top) + var(--topbar-height) + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(52,152,219,0.92);
    color: white;
    padding: 7px 18px;
    border-radius: 20px;
    font-size: 0.76rem;
    font-weight: 800;
    pointer-events: none;
    display: none;
    z-index: 9999;
    backdrop-filter: blur(6px);
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(52,152,219,0.35);
}

/* ===========================
   모달 / 오버레이
=========================== */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50000;
}
.modal-card {
    background: var(--modal-bg);
    color: var(--text);
    border-radius: 20px;
    padding: 24px 20px;
    width: 88vw;
    max-width: 400px;
    max-height: 85vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}
.modal-card h2 { margin: 0 0 14px; font-size: 1.15rem; }
.modal-card input[type=text] {
    width: 100%;
    padding: 11px 13px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    outline: none;
    margin-bottom: 12px;
}
.modal-btn {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.92rem;
    cursor: pointer;
    margin-bottom: 7px;
    transition: all 0.15s;
}
.modal-btn:active { transform: scale(0.97); }
.modal-btn.green { background: var(--green); color: #000; }
.modal-btn.gray  { background: rgba(128,128,128,0.2); color: var(--text); }
.modal-btn.red-btn { background: var(--red); color: white; }
.modal-btn.purple { background: var(--purple); color: white; }

/* ===========================
   로비 & 결과
=========================== */
.player-tag {
    display: inline-flex;
    align-items: center;
    background: var(--blue);
    color: white;
    padding: 5px 11px;
    border-radius: 14px;
    margin: 3px;
    font-size: 0.78rem;
    font-weight: 800;
}
.player-tag.spec { background: rgba(128,128,128,0.2); color: var(--text); border: 1px dashed rgba(128,128,128,0.4); }

.rank-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; margin-top: 10px; }
.rank-table th { color: var(--gold); border-bottom: 1px solid var(--border); padding: 5px; text-align: left; }
.rank-table td { padding: 5px; border-bottom: 1px solid var(--border); }

/* ===========================
   채팅 패널
=========================== */
#chat-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 55vh;
    background: var(--panel);
    border-top: 2px solid var(--border);
    border-radius: 20px 20px 0 0;
    display: flex;
    flex-direction: column;
    z-index: 40000;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 -6px 30px rgba(0,0,0,0.2);
}
#chat-panel.open { transform: translateY(0); }

#chat-panel-header {
    padding: 10px 14px 7px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
#chat-panel-header span { font-weight: 900; font-size: 0.87rem; }
#chat-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text); }

#chat-log-m {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 0.76rem;
    line-height: 1.5;
}
#chat-log-m div { margin-bottom: 3px; word-break: break-all; }

#game-log-m {
    max-height: 70px;
    overflow-y: auto;
    padding: 5px 12px;
    font-size: 0.7rem;
    opacity: 0.7;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
}

#chat-input-wrap {
    display: flex;
    padding: 7px 9px;
    gap: 5px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    padding-bottom: calc(7px + var(--safe-bottom));
}
#chat-input-m {
    flex: 1;
    padding: 9px 11px;
    border-radius: 18px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    outline: none;
}
#chat-send-btn {
    padding: 9px 14px;
    border-radius: 18px;
    border: none;
    background: var(--blue);
    color: white;
    font-weight: 900;
    font-size: 0.82rem;
    cursor: pointer;
}

/* 이모트 피커 */
#emote-picker-m {
    display: none;
    flex-wrap: wrap;
    gap: 4px;
    padding: 7px 9px;
    background: var(--bg);
    border-top: 1px solid var(--border);
}
.emote-btn-m {
    padding: 4px 9px;
    border-radius: 11px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
}

/* 이모트 말풍선 */
.emoji-bubble {
    position: absolute;
    top: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: black;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 0.73rem;
    font-weight: 700;
    white-space: nowrap;
    pointer-events: none;
    z-index: 99999;
    animation: bubble-pop 2.5s ease-in-out forwards;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.emoji-bubble::after {
    content: '';
    position: absolute;
    top: -5px; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: white;
    border-top: none;
}
@keyframes bubble-pop {
    0%   { opacity: 0; transform: translate(-50%, -8px) scale(0.5); }
    10%  { opacity: 1; transform: translate(-50%, 0) scale(1.15); }
    20%  { transform: translate(-50%, 0) scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, 12px); }
}

/* 테마 선택기 */
#theme-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
}
.theme-btn-m {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer;
    font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
    background: white;
}
.theme-btn-m.active { border-color: var(--blue); box-shadow: 0 0 6px var(--blue); }

/* 등록 점수 뱃지 */
#reg-score-m {
    position: fixed;
    top: calc(var(--safe-top) + var(--topbar-height) + 5px);
    right: 8px;
    background: rgba(241,196,15,0.15);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 3px 9px;
    border-radius: 11px;
    font-size: 0.67rem;
    font-weight: 900;
    z-index: 9000;
    display: none;
    pointer-events: none;
}

/* 모드 버튼 */
.mode-btn {
    padding: 7px 14px; border-radius: 10px;
    border: 1.5px solid var(--border);
    background: rgba(128,128,128,0.1);
    color: var(--text); font-family: 'Nunito', sans-serif;

            <button class="theme-btn-m cyber"        onclick="setTheme('cyber')">⚡</button>
        </div>

<script>
/* ================================================
   타일 크기 상수 (CSS --tw/--th 와 반드시 동기)
   가로 모드 감지해서 동적 적용
================================================ */
function getTileSize() {
    const landscape = window.innerWidth > window.innerHeight;
    return landscape ? { W: 36, H: 52 } : { W: 44, H: 62 };
}

/* ================================================
   전역 상태
================================================ */
let db;
let myName = '', myRole = 'player', currentHost = '';
let playerList = [], currentTurn = '', gameStatus = 'waiting', gameMode = 'normal';
let myHandData = [], boardTiles = {}, initialBoardState = {};
let sortMode = 'color', manualOrder = [];
let selectedTileId = null;
let placeModeActive = false;
let turnTimer = null;
window.latestPlayersData = {};
window.lastTileCounts = {};
window.isGameEnding = false;

/* ================================================
   사운드
================================================ */
function playBeep(freq = 440, dur = 0.1, vol = 0.3) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
}
function playSFX(k) {
    if (k === 'tilePick')   playBeep(600, 0.08, 0.2);
    if (k === 'tileDrop')   playBeep(440, 0.1,  0.2);
    if (k === 'error')      playBeep(200, 0.2,  0.3);
    if (k === 'success')    playBeep(880, 0.15, 0.25);
    if (k === 'turnAlarm')  { playBeep(660, 0.1, 0.3); setTimeout(() => playBeep(880, 0.1, 0.3), 150); }
    if (k === 'dangerAlarm'){ playBeep(330, 0.2, 0.3); setTimeout(() => playBeep(220, 0.2, 0.3), 250); }
}

/* ================================================
   테마
================================================ */
function setTheme(name) {
    document.body.setAttribute('data-theme', name);
    localStorage.setItem('lumi-theme', name);
    document.querySelectorAll('.theme-btn-m').forEach(b => b.classList.toggle('active', b.classList.contains(name)));
}

/* ================================================
   입장 처리
================================================ */
function handleEntry(role, isAuto = false) {
    if (!db) return setTimeout(() => handleEntry(role, isAuto), 100);
    if (!isAuto) {
        const v = document.getElementById('nick-input').value.trim();
        if (!v) return alert('닉네임을 입력하세요!');
        myName = v; myRole = role;
    } else {
        myName = sessionStorage.getItem('lumi-nick');
        myRole = sessionStorage.getItem('lumi-role') || 'player';
    }
    sessionStorage.setItem('lumi-nick', myName);
    sessionStorage.setItem('lumi-role', myRole);

    db.ref('players/' + myName).update({ joined: true, timestamp: Date.now(), role: myRole });
    db.ref('players/' + myName + '/joined').onDisconnect().set(false);
    document.getElementById('entry-overlay').style.display = 'none';
    playSFX('success');

    if (myRole === 'spectator') {
        document.getElementById('rack-wrap').style.display = 'none';
        document.getElementById('btn-spec-hand-m').style.display = 'flex';
        ['btn-end-m','btn-draw-m','btn-back-m','btn-hint-m'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
    }

    db.ref('board').once('value', s => { initialBoardState = s.val() || {}; });

    if (myRole === 'player') {
        db.ref('hands/' + myName).on('value', snap => {
            myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            db.ref('players/' + myName).update({ tileCount: myHandData.length });
            renderRack();
        });
    }
}

/* ================================================
   게임 로그
================================================ */
function addGameLog(msg) {
    if (!myName || !db) return;
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    db.ref('logs').push(`[${t}] ${msg}`);
}

/* ================================================
   보드 자동 핏 — 타일이 있으면 타일 영역에 맞게, 없으면 중앙 기본값
================================================ */
function fitBoardToView() {
    const { W, H } = getTileSize();
    if (Object.keys(boardTiles).length === 0) {
        boardScale = 1.0; boardTX = 30; boardTY = 30;
        applyBoardTransform(); return;
    }
    const xs = Object.values(boardTiles).map(t => t.x);
    const ys = Object.values(boardTiles).map(t => t.y);
    const minX = Math.min(...xs) - 16;
    const minY = Math.min(...ys) - 16;
    const maxX = Math.max(...xs) + W + 16;
    const maxY = Math.max(...ys) + H + 16;

    const bw = document.getElementById('board-wrap');
    const vw = bw.clientWidth, vh = bw.clientHeight;
    const tw = maxX - minX, th = maxY - minY;
    const PAD = 20;
    const scaleX = (vw - PAD*2) / tw;
    const scaleY = (vh - PAD*2) / th;
    boardScale = Math.min(scaleX, scaleY, 1.8);
    boardScale = Math.max(boardScale, 0.4);

    boardTX = (vw - tw * boardScale) / 2 - minX * boardScale;
    boardTY = (vh - th * boardScale) / 2 - minY * boardScale;
    applyBoardTransform();
}

/* ================================================
   핀치줌 + 패닝
================================================ */
let boardScale = 1, boardTX = 0, boardTY = 0;
let pinchDist0 = 0, pinchScale0 = 1;
let panStart = null;
let isPinching = false, isPanning = false;
let panMoved = false;

function applyBoardTransform() {
    document.getElementById('board-canvas').style.transform =
        `translate(${boardTX}px, ${boardTY}px) scale(${boardScale})`;
}

const boardWrap = document.getElementById('board-wrap');

boardWrap.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
        isPinching = true; isPanning = false; panStart = null;
        pinchDist0 = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        pinchScale0 = boardScale;
        e.preventDefault();
    } else if (e.touches.length === 1) {
        // 배치 모드일 때는 패닝 비활성화 (탭으로 처리)
        if (placeModeActive) return;
        isPanning = true; panMoved = false;
        panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx: boardTX, ty: boardTY };
    }
}, { passive: false });

boardWrap.addEventListener('touchmove', (e) => {
    if (isPinching && e.touches.length === 2) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        boardScale = Math.max(0.25, Math.min(4.0, pinchScale0 * (dist / pinchDist0)));
        applyBoardTransform();
        e.preventDefault();
    } else if (isPanning && panStart && e.touches.length === 1) {
        const dx = e.touches[0].clientX - panStart.x;
        const dy = e.touches[0].clientY - panStart.y;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) panMoved = true;
        boardTX = panStart.tx + dx;
        boardTY = panStart.ty + dy;
        applyBoardTransform();
        e.preventDefault();
    }
}, { passive: false });

boardWrap.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) isPinching = false;
    if (e.touches.length === 0) {
        isPanning = false;
        panStart = null;
    }
}, { passive: true });

/* ================================================
   보드 탭 → 타일 배치 (click 이벤트 단독 사용)
   패닝이 일어났으면 무시
================================================ */
boardWrap.addEventListener('click', (e) => {
    if (!placeModeActive || !selectedTileId) return;
    if (myRole !== 'player' || currentTurn !== myName) return;
    if (panMoved) { panMoved = false; return; }

    const { W, H } = getTileSize();
    const rect = boardWrap.getBoundingClientRect();
    let dropX = (e.clientX - rect.left - boardTX) / boardScale - W / 2;
    let dropY = (e.clientY - rect.top  - boardTY) / boardScale - H / 2;

    // 스냅: 인접 타일에 딱 붙이기
    const SNAP = W * 0.7;
    let snapped = false;
    Object.values(boardTiles).forEach(t => {
        if (snapped) return;
        const dx = dropX - t.x, dy = dropY - t.y;
        if (Math.abs(dy) < SNAP) {
            if (dx > 0 && dx < W * 1.6)        { dropX = t.x + W + 2; dropY = t.y; snapped = true; }
            else if (dx < 0 && dx > -W * 1.6)  { dropX = t.x - W - 2; dropY = t.y; snapped = true; }
        }
        if (!snapped && Math.abs(dx) < SNAP) {
            if (dy > 0 && dy < H * 1.6)        { dropY = t.y + H + 2; dropX = t.x; snapped = true; }
            else if (dy < 0 && dy > -H * 1.6)  { dropY = t.y - H - 2; dropX = t.x; snapped = true; }
        }
    });

    const tileData = myHandData.find(t => t.id === selectedTileId);
    if (!tileData) { cancelPlaceMode(); return; }

    const { id, ...clean } = tileData;
    const updates = {};
    updates[`board/${selectedTileId}`] = { ...clean, x: Math.round(dropX), y: Math.round(dropY) };
    updates[`hands/${myName}/${selectedTileId}`] = null;
    db.ref('/').update(updates).then(() => playSFX('tileDrop'));
    cancelPlaceMode();
}, true);

/* ================================================
   배치 모드 취소
================================================ */
function cancelPlaceMode() {
    placeModeActive = false;
    selectedTileId = null;
    document.getElementById('place-mode-hint').style.display = 'none';
    document.getElementById('cancel-place-btn').style.display = 'none';
    document.getElementById('snap-preview').style.display = 'none';
    boardWrap.classList.remove('place-mode');
    document.getElementById('rack-wrap').classList.remove('place-mode-rack');
    document.querySelectorAll('.tile.selected-tile').forEach(t => t.classList.remove('selected-tile'));
}

function enterPlaceMode(tileId, el) {
    cancelPlaceMode();
    selectedTileId = tileId;
    placeModeActive = true;
    if (el) el.classList.add('selected-tile');
    document.getElementById('place-mode-hint').style.display = 'block';
    document.getElementById('cancel-place-btn').style.display = 'block';
    boardWrap.classList.add('place-mode');
    document.getElementById('rack-wrap').classList.add('place-mode-rack');
    playSFX('tilePick');

    // 스냅 미리보기 — 보드 위 mousemove/touchmove로 갱신
    updateSnapPreview(null);
}

/* ================================================
   스냅 미리보기 업데이트
================================================ */
function updateSnapPreview(clientX, clientY) {
    const prev = document.getElementById('snap-preview');
    if (!placeModeActive || clientX == null) { prev.style.display = 'none'; return; }
    const { W, H } = getTileSize();
    const rect = boardWrap.getBoundingClientRect();
    let dx = (clientX - rect.left - boardTX) / boardScale - W / 2;
    let dy = (clientY - rect.top  - boardTY) / boardScale - H / 2;
    let snapped = false;
    const SNAP = W * 0.7;
    Object.values(boardTiles).forEach(t => {
        if (snapped) return;
        const dxd = dx - t.x, dyd = dy - t.y;
        if (Math.abs(dyd) < SNAP) {
            if (dxd > 0 && dxd < W * 1.6)       { dx = t.x + W + 2; dy = t.y; snapped = true; }
            else if (dxd < 0 && dxd > -W * 1.6) { dx = t.x - W - 2; dy = t.y; snapped = true; }
        }
        if (!snapped && Math.abs(dxd) < SNAP) {
            if (dyd > 0 && dyd < H * 1.6)       { dy = t.y + H + 2; dx = t.x; snapped = true; }
            else if (dyd < 0 && dyd > -H * 1.6) { dy = t.y - H - 2; dx = t.x; snapped = true; }
        }
    });
    const screenX = dx * boardScale + boardTX + rect.left;
    const screenY = dy * boardScale + boardTY + rect.top;
    prev.style.display = 'block';
    prev.style.width = (W * boardScale) + 'px';
    prev.style.height = (H * boardScale) + 'px';
    prev.style.left = (screenX - rect.left) + 'px';
    prev.style.top  = (screenY - rect.top)  + 'px';
}

boardWrap.addEventListener('mousemove', e => {
    if (!placeModeActive) return;
    updateSnapPreview(e.clientX, e.clientY);
});
boardWrap.addEventListener('touchmove', e => {
    if (!placeModeActive || e.touches.length !== 1) return;
    updateSnapPreview(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
boardWrap.addEventListener('mouseleave', () => {
    if (!placeModeActive) return;
    document.getElementById('snap-preview').style.display = 'none';
});

/* ================================================
   보드 타일: 탭으로 랙 복귀 (원래 타일은 불가)
================================================ */
function onBoardTileClick(e, id) {
    e.stopPropagation();
    if (myRole !== 'player' || currentTurn !== myName) return;
    if (placeModeActive) return;

}

================================================ */
function renderRack() {
    if (myRole === 'spectator') return;
    const inner = document.getElementById('rack-inner');
    inner.querySelectorAll('.tile').forEach(t => t.remove());

    let sorted = [...myHandData];
    const coMap = { red:1, blue:2, yellow:3, black:4, joker:5 };

    if (sortMode === 'manual' && manualOrder.length > 0) {
        sorted.sort((a, b) => {
            const ai = manualOrder.indexOf(a.id), bi = manualOrder.indexOf(b.id);
            return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
        });
    } else if (sortMode === 'color') {
        sorted.sort((a, b) => {
            const va = a.num === 'J' ? 99 : Number(a.num);
            const vb = b.num === 'J' ? 99 : Number(b.num);
            return (coMap[a.color] - coMap[b.color]) || (va - vb);
        });
    } else {
        sorted.sort((a, b) => {
            const va = a.num === 'J' ? 99 : Number(a.num);
            const vb = b.num === 'J' ? 99 : Number(b.num);
            return (va - vb) || (coMap[a.color] - coMap[b.color]);
        });
    }

    const isLandscape = window.innerWidth > window.innerHeight;
    // ★ 타일 간격: 타일 너비 + 4px 갭
    const { W } = getTileSize();
    const STEP = W + 4;
    const SIDE_PAD = 10;
    const totalW = sorted.length * STEP + SIDE_PAD * 2 + 60; // 60 = sort 버튼 공간
    inner.style.width = Math.max(totalW, window.innerWidth) + 'px';

    sorted.forEach((t, i) => {
        const div = document.createElement('div');
        div.id = 'rack-' + t.id;
        div.className = `tile rack-tile ${t.color}`;
        div.innerText = t.num;
        div.style.left = (SIDE_PAD + i * STEP) + 'px';

        if (t.id === selectedTileId) div.classList.add('selected-tile');

        // 클릭: 배치 모드 진입/취소
        div.addEventListener('click', (e) => {
            e.stopPropagation();
            if (myRole !== 'player' || currentTurn !== myName) return;
            if (selectedTileId === t.id) { cancelPlaceMode(); return; }
            enterPlaceMode(t.id, div);
        });

        inner.appendChild(div);
    });
}

/* ================================================
   게임 로직
================================================ */
function isValidSet(tiles) {
    if (tiles.length < 3) return false;
    const jokers = tiles.filter(t => t.num === 'J');
    const non = tiles.filter(t => t.num !== 'J');
    if (non.length === 0) return true;

    const isGroup = () => {
        const num = non[0].num;
        const colors = non.map(t => t.color);
        return non.every(t => t.num === num) && new Set(colors).size === colors.length && tiles.length <= 4;
    };
    const isRun = () => {
        const color = non[0].color;
        if (!non.every(t => t.color === color)) return false;
        const nums = non.map(t => Number(t.num)).sort((a,b) => a-b);
        if (new Set(nums).size !== nums.length) return false;
        let gap = 0;
        for (let i = 0; i < nums.length - 1; i++) gap += nums[i+1] - nums[i] - 1;
        if (gap > jokers.length) return false;
        const remaining = jokers.length - gap;
        return (nums[0] - remaining >= 1 || remaining === 0) && (nums[nums.length-1] <= 13);
    };
    return isGroup() || isRun();
}

function validateBoard() {
    const { W, H } = getTileSize();
    const SAME_ROW_THRESH = H * 0.6;
    const GAP_THRESH = W * 1.4;

    // y좌표 기준으로 그룹화 (같은 줄로 볼 threshold)
    const tiles = Object.values(boardTiles);
    if (tiles.length === 0) return true;

    // y 클러스터링
    const rows = [];
    const used = new Array(tiles.length).fill(false);
    tiles.forEach((t, i) => {
        if (used[i]) return;
        const row = [t]; used[i] = true;
        tiles.forEach((u, j) => {
            if (!used[j] && Math.abs(u.y - t.y) < SAME_ROW_THRESH) { row.push(u); used[j] = true; }
        });
        rows.push(row);
    });

    for (const row of rows) {
        row.sort((a, b) => a.x - b.x);
        let cur = [];
        for (let i = 0; i < row.length; i++) {
            cur.push(row[i]);
            const next = row[i + 1];
            if (!next || next.x - row[i].x > GAP_THRESH) {
                if (!isValidSet(cur)) return false;
                cur = [];
            }
        }
    }
    return true;
}

function nextTurnAction() {
    const next = playerList[(playerList.indexOf(currentTurn) + 1) % playerList.length];
    db.ref('/').update({ currentTurn: next, 'settings/turnStartTime': firebase.database.ServerValue.TIMESTAMP });
}

function handleTurnEnd() {
    if (myRole !== 'player') return;
    if (Object.keys(boardTiles).length === Object.keys(initialBoardState).length) return alert('패를 내거나 뽑으세요.');
    if (!validateBoard()) { playSFX('error'); return alert('보드 배치가 유효하지 않습니다!'); }
    if (window.isGameEnding) return;

    db.ref(`players/${myName}/registered`).once('value', snap => {
        const isReg = snap.val();
        if (!isReg) {
            const { W } = getTileSize();
            const GAP_THRESH = W * 1.4;
            let isPiggy = false;
            const rows = {};
            Object.entries(boardTiles).forEach(([id, t]) => {
                t._id = id;
                const key = Math.round(t.y / 10) * 10;
                if (!rows[key]) rows[key] = [];
                rows[key].push({ ...t, _id: id });
            });
            for (let key in rows) {
                const rt = rows[key].sort((a, b) => a.x - b.x);
                let cur = [];
                for (let i = 0; i < rt.length; i++) {
                    cur.push(rt[i]);
                    if (!rt[i+1] || rt[i+1].x - rt[i].x > GAP_THRESH) {
                        const hasOld = cur.some(t => initialBoardState[t._id]);
                        const hasNew = cur.some(t => !initialBoardState[t._id]);
                        if (hasOld && hasNew) isPiggy = true;
                        cur = [];
                    }
                }
            }
            if (isPiggy) { playSFX('error'); return alert('첫 등록 시에는 바닥 패에 붙일 수 없습니다.'); }
            let pts = 0;
            Object.entries(boardTiles).forEach(([id, t]) => { if (!initialBoardState[id]) pts += (t.num === 'J' ? 30 : Number(t.num)); });
            if (pts < 30) { playSFX('error'); return alert(`등록 실패 (${pts}점)! 30점 이상 내야 합니다.`); }
            db.ref(`players/${myName}`).update({ registered: true });
        }

        if (myHandData.length === 0) {
            window.isGameEnding = true;
            db.ref('hands').once('value', hs => {
                const all = hs.val();
                const scores = {};
                playerList.forEach(p => {
                    let s = 0;
                    Object.values(all[p] || {}).forEach(t => s += (t.num === 'J' ? 50 : Number(t.num)));
                    scores[p] = s;
                });
                recordWin(myName);
                db.ref('/').update({ 'settings/status': 'finished', 'settings/gameResult': { winner: myName, scores } })
                  .then(() => setTimeout(() => { window.isGameEnding = false; }, 3000));
            });
        } else {
            addGameLog(!isReg ? `⭐ ${myName}님이 첫 등록에 성공했습니다!` : `🔄 ${myName}님이 턴을 마쳤습니다.`);
            if (!isReg) db.ref('shake').set({ by: myName, time: Date.now() });
            nextTurnAction();
        }
    });
}

function rollbackTurn() {

    const up = {};

/* ================================================
   힌트 — 손패 + 보드 새 타일 조합 고려
================================================ */
function showHint() {
    if (myRole !== 'player' || currentTurn !== myName) return alert('내 차례에만 사용할 수 있습니다.');
    document.querySelectorAll('.tile.hint-target').forEach(t => t.classList.remove('hint-target'));

    const hand = [...myHandData];
    if (hand.length === 0) return alert('손패가 없습니다.');

    const coMap = { red:1, blue:2, yellow:3, black:4, joker:5 };
    const hintIds = new Set();

    // 같은 숫자 그룹 (3개 이상, 다른 색)
    const numMap = {};
    hand.forEach(t => {
        if (t.num === 'J') return;
        if (!numMap[t.num]) numMap[t.num] = [];
        if (!numMap[t.num].find(i => i.color === t.color)) numMap[t.num].push(t);
    });
    Object.values(numMap).forEach(g => {
        if (g.length >= 3) g.forEach(t => hintIds.add(t.id));
    });

    // 같은 색 연속 숫자 런 (3개 이상)
    const colMap = { red:[], blue:[], yellow:[], black:[] };
    hand.forEach(t => { if (t.num !== 'J' && colMap[t.color]) colMap[t.color].push(t); });
    Object.values(colMap).forEach(tiles => {
        tiles.sort((a, b) => Number(a.num) - Number(b.num));
        let run = [tiles[0]];
        for (let i = 1; i < tiles.length; i++) {
            if (Number(tiles[i].num) === Number(run[run.length-1].num) + 1) {
                run.push(tiles[i]);
            } else {
                if (run.length >= 3) run.forEach(t => hintIds.add(t.id));
                run = [tiles[i]];
            }
        }
        if (run.length >= 3) run.forEach(t => hintIds.add(t.id));
    });

    // 조커 포함 런/그룹 체크
    const jokers = hand.filter(t => t.num === 'J');
    if (jokers.length > 0) {
        // 조커가 있으면 2개짜리 그룹/런도 힌트
        Object.values(numMap).forEach(g => {
            if (g.length >= 2) g.forEach(t => { hintIds.add(t.id); jokers.forEach(j => hintIds.add(j.id)); });
        });
        Object.values(colMap).forEach(tiles => {
            tiles.sort((a, b) => Number(a.num) - Number(b.num));
            let run = [tiles[0]];
            for (let i = 1; i < tiles.length; i++) {
                if (Number(tiles[i].num) <= Number(run[run.length-1].num) + 2) {
                    run.push(tiles[i]);
                } else { run = [tiles[i]]; }
            }
            if (run.length >= 2) { run.forEach(t => hintIds.add(t.id)); jokers.forEach(j => hintIds.add(j.id)); }
        });
        jokers.forEach(t => hintIds.add(t.id));
    }

    if (hintIds.size === 0) return alert('현재 낼 수 있는 타일이 없습니다.');

    hintIds.forEach(id => {
        const el = document.getElementById('rack-' + id);
        if (el) el.classList.add('hint-target');
    });
    setTimeout(() => document.querySelectorAll('.tile.hint-target').forEach(t => t.classList.remove('hint-target')), 5000);
}

async function getRankHtml() {

            let html = `<table class="rank-table"><tr><th>이름</th><th>승리</th></tr>`;

            sorted.forEach(([n,d]) => { html += `<tr><td>${n}</td><td>${d.wins}회</td></tr>`; });
            html += `</table>`;
            resolve(html);
        });

function startGame() {
    if (playerList.length < 2) return alert('최소 2명이 필요합니다.');
    const colors = ['red','blue','yellow','black'];
    const sets = gameMode === 'expert' ? 3 : 2;
    let pool = [];
    colors.forEach(c => { for(let i=1;i<=13;i++) for(let j=0;j<sets;j++) pool.push({num:i,color:c}); });
    pool.push({num:'J',color:'joker'},{num:'J',color:'joker'});
    if (sets===3) pool.push({num:'J',color:'joker'},{num:'J',color:'joker'});
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }

    const updates = { board:null, currentTurn:playerList[0], 'settings/status':'playing', chats:null, logs:null };
    const hands = {};
    playerList.forEach(p => { hands[p]={}; updates[`players/${p}/registered`]=false; });
    for(let i=0;i<14;i++) {
        playerList.forEach(p => {
            const t = pool.pop();
            if(t) hands[p]['tile_'+Math.random().toString(36).substr(2,9)] = t;
        });
    }
    updates['hands'] = hands;
    const poolObj = {}; pool.forEach((t,i) => poolObj[`p_${i}`]=t);
    updates['pool'] = poolObj;
    db.ref('/').update(updates).then(() => {
        db.ref('settings/turnStartTime').set(firebase.database.ServerValue.TIMESTAMP);
        addGameLog('📢 게임이 시작되었습니다!');
    });
}

function returnToLobby() {
    if (!confirm('방 전체 데이터를 초기화할까요?')) return;
    const up = { 'settings/status':'waiting', board:null, hands:null, pool:null, 'settings/gameResult':null };
    const shuffled = [...playerList].sort(() => Math.random()-0.5);
    shuffled.forEach((n,i) => { up[`players/${n}/timestamp`] = i*1000+Math.floor(Math.random()*999); });
    db.ref('/').update(up).then(() => addGameLog('🔀 플레이어 순서가 랜덤으로 섞였습니다.'));
}

/* ================================================
   채팅
================================================ */
function toggleChatPanel() {
    document.getElementById('chat-panel').classList.toggle('open');
}
function sendChat() {
    const inp = document.getElementById('chat-input-m');
    if (!inp.value.trim()) return;
    db.ref('chats').push({ name: myName, msg: inp.value.trim(), color: 'var(--text)' });
    inp.value = '';
}

const EMOTE_SETS = [
    {e:'😋', t:'이게 되네?'}, {e:'🔥', t:'가능한.'},
    {e:'👀', t:'빤히...빤히...'}, {e:'😭', t:'아 진짜 왜 이래'},
    {e:'😘', t:'고마워~'}, {e:'😨', t:'안 돼 안 돼'},
    {e:'💀', t:'실화임?'}, {e:'😱', t:'등록하지마'},
    {e:'🐱', t:'냐냐냥!!!'},
];
let emotesBuilt = false;
function toggleEmotePicker() {
    const p = document.getElementById('emote-picker-m');
    if (!emotesBuilt) {
        EMOTE_SETS.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'emote-btn-m';
            btn.innerHTML = `${item.e} ${item.t}`;
            btn.onclick = () => {
                db.ref('emotes').push({ name: myName, emote: `${item.e} ${item.t}`, time: Date.now() });
                p.style.display = 'none';
            };
            p.appendChild(btn);
        });
        emotesBuilt = true;
    }
    p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
}

function showBubble(playerName, emote) {
    let badge = document.getElementById('badge-' + playerName);
    if (!badge) return;
    const existing = badge.querySelector('.emoji-bubble');
    if (existing) existing.remove();
    const bub = document.createElement('div');
    bub.className = 'emoji-bubble';
    bub.innerText = emote;
    badge.appendChild(bub);
    setTimeout(() => bub.parentNode && bub.remove(), 2600);
}

/* ================================================
   시간 초과 패널티
================================================ */
function timeOutPenalty() {
    if (window.isPenalizing) return;
    window.isPenalizing = true;
    alert('시간 초과! 바닥 초기화 및 벌칙 타일 3개.');
    addGameLog(`⏰ ${myName}님이 시간 초과로 벌칙 타일 3개를 받았습니다.`);
    const up = {};
    Object.keys(boardTiles).forEach(k => { if(!initialBoardState[k]) up[`hands/${myName}/${k}`] = boardTiles[k]; });
    up['board'] = initialBoardState;
    db.ref('pool').limitToFirst(3).once('value', s => {
        if (s.exists()) {
            Object.entries(s.val()).forEach(([k, v]) => {
                up[`hands/${myName}/tile_${Date.now()}_${Math.random().toString(36).substr(2,5)}`] = v;
                up[`pool/${k}`] = null;
            });
        }
        db.ref('/').update(up).then(() => { playSFX('error'); nextTurnAction(); window.isPenalizing = false; });
    });
}

/* ================================================
   Firebase 초기화 & 리스너
================================================ */
window.onload = function() {
    const config = {
        apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY",
        authDomain: "lumi-b373e.firebaseapp.com",
        databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/",
        projectId: "lumi-b373e"
    };

    function initDB() {
        if (typeof firebase === 'undefined') { setTimeout(initDB, 100); return; }
        if (!firebase.apps.length) firebase.initializeApp(config);
        db = firebase.database();

        const saved = localStorage.getItem('lumi-theme') || 'classic';
        setTheme(saved);

        setTimeout(() => {
            if (sessionStorage.getItem('lumi-nick')) handleEntry(null, true);
            else document.getElementById('entry-overlay').style.display = 'flex';
        }, 200);

        // 초기 보드 뷰
        boardScale = 1.0; boardTX = 30; boardTY = 30;
        applyBoardTransform();

        // 방향 변경 시 랙 다시 렌더
        window.addEventListener('orientationchange', () => setTimeout(renderRack, 200));
        window.addEventListener('resize', () => setTimeout(renderRack, 200));

        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || 'waiting';
            const overlay = document.getElementById('overlay');
            overlay.style.display = gameStatus === 'playing' ? 'none' : 'flex';
            if (gameStatus === 'waiting') renderLobbyUI();
            else if (gameStatus === 'finished') renderResultUI();
            if (gameStatus !== 'playing' && turnTimer) {
                clearInterval(turnTimer);
                document.getElementById('timer-m').innerText = '';
            }
        });

        db.ref('settings/host').on('value', snap => {
            currentHost = snap.val();
            updatePlayerUI();
            if (gameStatus === 'waiting') renderLobbyUI();
        });

        db.ref('settings/gameMode').on('value', snap => {
            gameMode = snap.val() || 'normal';
            if (gameStatus === 'waiting') renderLobbyUI();
        });

        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            window.latestPlayersData = players;
            if (!window.lastTileCounts) window.lastTileCounts = {};

            Object.entries(players).forEach(([name, pd]) => {
                if (pd.joined && pd.role === 'player' && pd.tileCount <= 3 && pd.tileCount > 0) {
                    if (window.lastTileCounts[name] === undefined || window.lastTileCounts[name] > pd.tileCount) {
                        if (!window.lastTileCounts[name] || window.lastTileCounts[name] > 3) {
                            addGameLog(`⚠️ 경고! ${name}님의 남은 타일이 ${pd.tileCount}개!`);
                            playSFX('dangerAlarm');
                        }
                    }
                }
                window.lastTileCounts[name] = pd.tileCount;
            });

            playerList = Object.entries(players)
                .filter(p => p[1].joined && p[1].role === 'player')
                .sort((a,b) => (a[1].timestamp||0)-(b[1].timestamp||0))
                .map(p => p[0]);
            if (playerList.length > 0) {
                let target = playerList.includes('계헌') ? '계헌' : playerList[0];
                if (currentHost !== target) db.ref('settings/host').set(target);
            }
            updatePlayerUI();
            if (gameStatus === 'waiting') renderLobbyUI();
        });

        db.ref('currentTurn').on('value', snap => {
            currentTurn = snap.val();
            const isMy = currentTurn === myName && myRole === 'player';

            ['btn-end-m','btn-draw-m','btn-back-m','btn-hint-m'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !isMy;
            });

            boardWrap.classList.toggle('not-my-turn', !isMy);

            if (isMy) {
                playSFX('turnAlarm');
                initialBoardState = JSON.parse(JSON.stringify(boardTiles));
                fitBoardToView();
            }
            updatePlayerUI();
            updateRegScoreUI();
            cancelPlaceMode();
        });

        db.ref('settings/turnStartTime').on('value', snap => {
            const startTime = snap.val();
            const timerEl = document.getElementById('timer-m');
            if (!startTime || gameStatus !== 'playing') { if (timerEl) timerEl.innerText = ''; return; }
            if (turnTimer) clearInterval(turnTimer);
            turnTimer = setInterval(() => {
                const left = 60 - Math.floor((Date.now() - startTime) / 1000);
                if (timerEl) timerEl.innerText = Math.max(left, 0) + 's';
                if (left <= 0 && currentTurn === myName && myRole === 'player') {
                    clearInterval(turnTimer); timeOutPenalty();
                }
            }, 1000);
        });

        let boardFirstLoad = true;
        db.ref('board').on('value', snap => {
            boardTiles = snap.val() || {};
            updateRegScoreUI();
            renderBoard();
            if (boardFirstLoad && Object.keys(boardTiles).length > 0) {
                boardFirstLoad = false;
                setTimeout(fitBoardToView, 100);
            }
        });

        db.ref('pool').on('value', snap => {
            document.getElementById('pool-info').innerText = `POOL: ${snap.exists() ? Object.keys(snap.val()).length : 0}`;
        });

        db.ref('chats').limitToLast(20).on('child_added', snap => {
            const c = snap.val();
            const div = document.createElement('div');
            div.style.color = c.color || 'var(--text)';
            div.innerHTML = `<b>${c.name}:</b> ${c.msg}`;
            const box = document.getElementById('chat-log-m');
            if (box) { box.appendChild(div); box.scrollTop = box.scrollHeight; }
        });

        db.ref('logs').limitToLast(30).on('child_added', snap => {
            const msg = snap.val();
            const div = document.createElement('div');
            div.innerText = typeof msg === 'object' ? `[${msg.time}] ${msg.msg}` : msg;
            const log = document.getElementById('game-log-m');
            if (log) { log.appendChild(div); log.scrollTop = log.scrollHeight; }
        });

        db.ref('shake').on('value', snap => {
            const data = snap.val();
            if (!data || Date.now() - data.time > 10000 || data.by === myName) return;
            const app = document.getElementById('app');
            app.classList.add('screen-shaking');
            setTimeout(() => app.classList.remove('screen-shaking'), 600);
        });

        db.ref('emotes').limitToLast(10).on('child_added', snap => {
            const data = snap.val();
            if (Date.now() - data.time > 10000) return;
            showBubble(data.name, data.emote);
        });
    }

    initDB();
};
</script>
